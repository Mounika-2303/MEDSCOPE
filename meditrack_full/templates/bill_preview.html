<!DOCTYPE html>
<html>
<head>
  <title>Bill Preview | MedScope</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
  {% include 'navbar.html' %}
  
  <div class="card shadow-sm p-4">
    <h3 class="text-center text-success mb-3">🧾 Bill Preview</h3>

    <p><strong>Customer:</strong> {{ customer_name }}</p>
    <p><strong>Date:</strong> {{ date }}</p>
    <p><strong>Total Amount:</strong> ₹{{ total_amount }}</p>

    <hr>

    <div class="text-center">
      <iframe src="{{ pdf_url }}" width="100%" height="600px" style="border:1px solid #ccc;"></iframe>
    </div>

    <div class="mt-3 text-center">
      <a href="{{ pdf_url }}" download class="btn btn-primary">⬇️ Download PDF</a>
      <a href="/billing" class="btn btn-secondary">← Back to Billing</a>
    </div>
  </div>

</body>
</html>
