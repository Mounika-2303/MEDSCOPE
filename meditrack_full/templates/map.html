<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Find Medicines Near You | MedScope</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

  <style>
    #map { height: 70vh; border-radius: 10px; margin-top: 10px; }
    body { background-color: #f8f9fa; }
  </style>
</head>
<body class="container mt-3">
  {% include 'navbar.html' %}
  
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h3 class="mb-0 text-primary">Find Medicine Nearby (Hyderabad)</h3>
    {% if not session.get('user_email') %}
    <div class="alert alert-info mb-0 py-2 px-3">
      <small>⚡ Guest Mode - <a href="{{ url_for('login', role='user') }}">Login</a> for saved searches</small>
    </div>
    {% endif %}
  </div>

  <!-- Search and Location Controls -->
  <div class="row mb-3">
    <div class="col-md-8">
      <input id="searchInput" class="form-control" placeholder="Enter medicine name (e.g. paracetamol)">
    </div>
    <div class="col-md-4 d-flex gap-2">
      <button id="searchBtn" class="btn btn-primary flex-fill">Search & Plot</button>
      <button id="locBtn" class="btn btn-secondary flex-fill">Use My Location</button>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <script>
  // Default: Hyderabad center
  const defaultCenter = [17.3850, 78.4867];
  let map = L.map('map').setView(defaultCenter, 12);

  // Base map tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // User location marker
  let userMarker = null;
  let userCoords = { lat: 17.3850, lon: 78.4867 }; // default to Hyderabad

  function setUserMarker(lat, lon) {
    userCoords = { lat, lon };
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([lat, lon], {
      title: "Your Location"
    }).addTo(map)
      .bindPopup("<b>You are here</b>")
      .openPopup();
    map.setView([lat, lon], 13);
  }

  // Button: Use current location
  document.getElementById('locBtn').addEventListener('click', () => {
    if (!navigator.geolocation) {
      alert("Geolocation not supported by your browser");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => setUserMarker(pos.coords.latitude, pos.coords.longitude),
      () => alert("Unable to access your location")
    );
  });

  // Button: Search & plot pharmacies
  document.getElementById('searchBtn').addEventListener('click', () => {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) {
      alert("Please enter a medicine name to search");
      return;
    }

    fetch(`/pharmacies_api?q=${encodeURIComponent(query)}&lat=${userCoords.lat}&lon=${userCoords.lon}`)
      .then(res => res.json())
      .then(data => {
        if (!data.length) {
          alert("No pharmacies found for this medicine nearby.");
          return;
        }

        // Remove old markers (keep user marker)
        map.eachLayer(layer => {
          if (layer instanceof L.Marker && layer !== userMarker) map.removeLayer(layer);
        });

        const coords = [];

        // Plot pharmacies
        data.forEach((p, index) => {
          if (!p.lat || !p.lon) return;

          const color = (index === 0) ? "red" : "blue"; // nearest pharmacy = red
          const icon = L.icon({
            iconUrl: `https://maps.google.com/mapfiles/ms/icons/${color}-dot.png`,
            iconSize: [32, 32],
            iconAnchor: [16, 32]
          });

          const marker = L.marker([p.lat, p.lon], { icon }).addTo(map);

          marker.bindPopup(`
            <b>${p.pharmacy_name || 'Pharmacy'}</b><br>
            ${p.address || 'Address not available'}<br>
            <b>Medicine:</b> ${p.name}<br>
            <b>Qty:</b> ${p.quantity}<br>
            <b>Expiry:</b> ${p.expiry || 'N/A'}<br>
            <b>Distance:</b> ${p.distance || '?'} km
          `);

          coords.push([p.lat, p.lon]);

          // Open nearest (first) popup
          if (index === 0) marker.openPopup();
        });

        // Zoom to show all pharmacies
        if (coords.length) map.fitBounds(coords, { padding: [50, 50] });
      })
      .catch(err => {
        console.error("Error fetching pharmacies:", err);
        alert("Error fetching pharmacy data. Please try again.");
      });
  });

  // Default marker for Hyderabad
  setUserMarker(17.3850, 78.4867);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
