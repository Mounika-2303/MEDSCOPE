<!DOCTYPE html>
<html>
<head>
  <title>Billing | MedScope</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
  {% include 'navbar.html' %}

  <h2 class="text-primary mb-3">Billing Section</h2>
  <p class="text-muted">You can scan barcodes using camera or enter medicines manually.</p>

  <div class="row">
    <!-- Left Column: Barcode Scanner -->
    <div class="col-md-5">
      <div class="card shadow-sm p-3 mb-3">
        <h5 class="text-center">Scan Barcode</h5>
        <div id="reader" style="width:100%;"></div>
        <small class="text-muted d-block mt-2 text-center">
          Allow camera access. Scanner reads <b>batch_no</b> as barcode.
        </small>
      </div>
    </div>

    <!-- Right Column: Multi-Medicine Billing -->
    <div class="col-md-7">
      <div class="card shadow-sm p-3">
        <h5 class="mb-3">Manual Billing</h5>
        <form method="POST" id="billingForm">
          <div class="mb-3">
            <label class="form-label">Customer Name</label>
            <input type="text" name="customer_name" class="form-control" placeholder="Enter customer name" required>
          </div>

          <div id="medicineList">
            <div class="medicine-item mb-3 border rounded p-2">
              <label class="form-label">Medicine Name</label>
              <input type="text" name="medicine_name[]" placeholder="Enter medicine name" class="form-control mb-2" required>
              <label class="form-label">Quantity</label>
              <input type="number" name="quantity[]" placeholder="Quantity" class="form-control" value="1" min="1" required>
            </div>
          </div>

          <button type="button" class="btn btn-secondary btn-sm mb-3" onclick="addMedicine()">➕ Add Another Medicine</button>

          <input type="hidden" name="barcode" id="barcode_input">
          <button type="submit" class="btn btn-success w-100">Generate Bill</button>
        </form>
      </div>
    </div>
  </div>

  {% if message %}
  <div class="alert 
      {% if '❌' in message %}alert-danger
      {% elif '⚠️' in message %}alert-warning
      {% else %}alert-success{% endif %} 
      mt-3">
    {{ message }}
  </div>
  {% endif %}

  <!-- Barcode Scanner Script -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    // Function to add another medicine input
    function addMedicine() {
      const div = document.createElement('div');
      div.classList.add('medicine-item', 'mb-3', 'border', 'rounded', 'p-2');
      div.innerHTML = `
        <label class="form-label">Medicine Name</label>
        <input type="text" name="medicine_name[]" placeholder="Enter medicine name" class="form-control mb-2" required>
        <label class="form-label">Quantity</label>
        <input type="number" name="quantity[]" placeholder="Quantity" class="form-control" value="1" min="1" required>
      `;
      document.getElementById('medicineList').appendChild(div);
    }

    // Barcode scanner integration
    function onScanSuccess(decodedText) {
      document.getElementById('barcode_input').value = decodedText;
      document.getElementById('billingForm').submit();
    }

    function onScanError(error) { /* ignore */ }

    const html5QrcodeScanner = new Html5QrcodeScanner(
      "reader",
      { fps: 10, qrbox: { width: 250, height: 250 } }
    );
    html5QrcodeScanner.render(onScanSuccess, onScanError);
  </script>
</body>
</html>
