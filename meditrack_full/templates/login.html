<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login | MedScope</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      max-width: 450px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card login-card">
          <div class="card-body p-5">
            <h2 class="text-center mb-4 text-primary">🔐 Login to MedScope</h2>
            
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            
            <form method="POST">
              <input type="hidden" name="role" value="{{ role }}">
              
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
              </div>
              
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
              </div>
              
              <div class="mb-3">
                <label class="form-label">Login As</label>
                <select name="role" class="form-select" required>
                  <option value="user" {% if role == 'user' %}selected{% endif %}>User</option>
                  <option value="pharmacy" {% if role == 'pharmacy' %}selected{% endif %}>Pharmacy</option>
                  <option value="admin" {% if role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
              </div>
              
              <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
            </form>
            
            <div class="text-center">
              {% if role != 'admin' %}
              <p class="mb-0">Don't have an account? <a href="{{ url_for('register', role=role) }}">Register here</a></p>
              {% endif %}
              <p class="mt-2"><a href="{{ url_for('home') }}">← Back to Home</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
